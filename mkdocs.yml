# ================= 1. 需要你修改的个人信息 =================
site_name: RealVirt 的笔记本
site_author: RealVirt
site_description: 我的大学学习与生活

# 如果你以后把代码传到了Github，把下面两行的 # 号删掉，换成你的链接
repo_name: 'Daokexun/Daokexun.github.io'
repo_url: 'https://github.com/Daokexun/Daokexun.github.io'

copyright: Copyright &copy; 2024 RealVirt

# ================= 2. 网站主题与功能配置 =================
theme:
  name: material
  language: 'zh'
  
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
          icon: material/weather-sunny
          name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
        
  features:
    - navigation.tabs
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy

# ================= 3. 页面底部的社交链接 =================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Daokexun
      name: 我的 GitHub


